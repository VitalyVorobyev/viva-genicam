name: Python wheels

on:
  push:
    branches: [main]
    tags: ['py-v*']
  pull_request:
    paths:
      - 'crates/viva-pygenicam/**'
      - 'crates/viva-genicam/**'
      - 'crates/viva-genapi*/**'
      - 'crates/viva-gige/**'
      - 'crates/viva-u3v/**'
      - 'crates/viva-pfnc/**'
      - 'crates/viva-sfnc/**'
      - '.github/workflows/python.yml'
  workflow_dispatch:

jobs:
  build:
    name: wheel ${{ matrix.target }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python: '3.12'
          - os: macos-14
            target: aarch64-apple-darwin
            python: '3.12'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python: '3.12'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # libusb is statically linked into the extension via `rusb/vendored`,
      # so no system libusb needs to be installed on any platform.
      # For Linux we specify `manylinux` + `container` as action inputs so
      # the action spins up the matching manylinux docker image (the runner
      # itself has glibc ≥2.38 which would emit non-compliant symbols).
      - name: Build wheel (abi3)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/viva-pygenicam
          target: ${{ matrix.target }}
          manylinux: ${{ startsWith(matrix.os, 'ubuntu') && '2_28' || 'auto' }}
          container: ${{ startsWith(matrix.os, 'ubuntu') && 'quay.io/pypa/manylinux_2_28_x86_64' || '' }}
          args: --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: crates/viva-pygenicam/dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/viva-pygenicam
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/viva-pygenicam/dist/*.tar.gz

  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build fake camera
        run: cargo build -p viva-fake-gige --release
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - name: Install wheel + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pytest
          python -m pip install --no-index --find-links dist viva-genicam
      - name: Run pytest against installed wheel
        run: python -m pytest crates/viva-pygenicam/tests -v

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist, test]
    if: startsWith(github.ref, 'refs/tags/py-v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
