name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          # macOS is Apple Silicon only -- GitHub retired the Intel
          # (macos-13) runners. An x86_64 (Intel) Mac binary could be
          # added later via cross-compile + vendored libusb, or as a
          # lipo universal binary.
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} -p viva-camctl -p viva-service

      - name: Package archive
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          STAGE="viva-genicam-${TAG}-${TARGET}"
          mkdir -p "$STAGE"
          cp README.md LICENSE CHANGELOG.md "$STAGE/"
          if [ "$ARCHIVE" = "zip" ]; then
            cp "target/${TARGET}/release/viva-camctl.exe" "$STAGE/"
            cp "target/${TARGET}/release/viva-service.exe" "$STAGE/"
            7z a "${STAGE}.zip" "$STAGE" >/dev/null
            echo "ARCHIVE_FILE=${STAGE}.zip" >> "$GITHUB_ENV"
          else
            cp "target/${TARGET}/release/viva-camctl" "$STAGE/"
            cp "target/${TARGET}/release/viva-service" "$STAGE/"
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            echo "ARCHIVE_FILE=${STAGE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE_FILE }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
