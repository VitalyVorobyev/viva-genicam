name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests (release)
        run: cargo test --workspace --all-targets --all-features --release

      - name: Package published crates
        run: |
          for crate in viva-gencp viva-pfnc viva-sfnc viva-genapi-xml viva-genapi \
                       viva-gige viva-u3v viva-genicam viva-zenoh-api viva-service; do
            cargo package -p "$crate" --locked
          done

      - name: Build release binaries
        run: cargo build --release --locked -p viva-camctl -p viva-service

      - name: Collect artifacts
        run: |
          mkdir -p dist
          TAG="${{ github.ref_name }}"
          for bin in viva-camctl viva-service; do
            cp "target/release/$bin" "dist/${bin}-${TAG}-x86_64-unknown-linux-gnu"
          done
          tar -czf "dist/genicam-rs-${TAG}-x86_64-unknown-linux-gnu.tar.gz" \
            -C dist \
            "viva-camctl-${TAG}-x86_64-unknown-linux-gnu" \
            "viva-service-${TAG}-x86_64-unknown-linux-gnu"
          cp target/package/*.crate dist/
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.crate
            dist/SHA256SUMS.txt
