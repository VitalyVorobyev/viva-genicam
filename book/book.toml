[book]
title = "viva-genicam Book"
authors = ["The viva-genicam contributors"]
language = "en"
src = "src"

[build]
create-missing = true

[output.html]
# Single-site: host the book at the site root (e.g. /viva-genicam/ on GitHub Pages)
site-url = "/viva-genicam/"
git-repository-url = "https://github.com/VitalyVorobyev/viva-genicam"
# Add a navbar link to the API reference (generated rustdoc) that you'll place under /api/
additional-css = []
additional-js = []

[preprocessor]
# (optional) add preprocessors later, e.g. mermaid or links-checker
